<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Make Social Media Boring</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <div class="header-row">
        <div class="brand-block">
          <img
            class="popup-logo"
            src="../../icons/icon48.png"
            width="40"
            height="40"
            alt=""
          />
          <div>
            <h1>Make Social Media Boring</h1>
            <p class="sub">Less stimulating feeds. Same sites.</p>
          </div>
        </div>
        <button
          type="button"
          class="cog"
          id="open-settings"
          title="Settings"
          aria-label="Open settings"
        >
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path
              fill="currentColor"
              d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a7.2 7.2 0 0 0-1.62-.94l-.36-2.54A.49.49 0 0 0 13.9 2h-3.8a.49.49 0 0 0-.48.41l-.36 2.54c-.59.22-1.13.53-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.47a.49.49 0 0 0 .12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94L2.86 14.52a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.3.59.22l2.39-.96c.49.4 1.03.72 1.62.94l.36 2.54c.05.24.25.41.48.41h3.8c.24 0 .44-.17.48-.41l.36-2.54c.59-.22 1.13-.53 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 0 0-.12-.61l-2.03-1.58zM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7z"
            />
          </svg>
        </button>
      </div>
    </header>

    <label class="debug-row">
      <input type="checkbox" id="debugLogging" />
      <span>Debug logging</span>
    </label>

    <section class="block">
      <div class="section-head">
        <h2>Sites</h2>
        <button type="button" class="linkish" id="open-settings-link">
          Settings
        </button>
      </div>
      <form id="sites-form" class="settings sites"></form>
    </section>

    <footer>
      <span
        >Use the cog for per-site settings. Reload a tab after enabling a new
        site.</span
      >
    </footer>

    <script type="module" src="popup.js"></script>
  </body>
</html>
